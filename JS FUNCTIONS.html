<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1 id="result"></h1>
    <button onclick="sum(23,54)"> Click to get 23+54 </button>
    <button onclick="sum(12,43)"> Click to get 12-43 </button>
    <button onclick= "sayHello()" > Click to greet❤😊 </button>
    <script>
        function sum(a,b) {
            document.getElementById("result").innerHTML = (a + b);
        }
        
        function sayHello() {
            document.getElementById("result").innerHTML = "Hello, Nice to mmeet you !!☺😊";
        }
        
        
    </script>
</body>
</html>
